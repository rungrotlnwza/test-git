<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>User Profile</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <div class="container py-5">
    <div class="card main-card p-4">
      <div class="row align-items-center mb-4">
        <div class="col-md-3 text-center">
          <img id="imgid" src="" alt="Profile" class="profile-img mb-3">
          <div class="d-grid gap-2">
            <button class="btn btn-outline-primary btn-sm">Change Image</button>
            <button class="btn btn-outline-danger btn-sm">Delete Image</button>
          </div>
        </div>

        <div class="col-md-9">
          <h2 id="fullName" class="fw-bold mb-1">Full Name</h2>
          <p id="username" class="text-muted mb-3">@username</p>

          <div class="action-row">
            <a href="edit.html" class="btn btn-primary">Edit Profile</a>
          </div>
        </div>
      </div>

      <h4 class="section-title">User Information</h4>
      <div class="row g-3">
        <div class="col-md-6">
          <div class="info-box">
            <strong>Email</strong>
            <p id="email" class="mb-0 mt-2">-</p>
          </div>
        </div>
        <div class="col-md-6">
          <div class="info-box">
            <strong>Phone</strong>
            <p id="phone" class="mb-0 mt-2">-</p>
          </div>
        </div>
        <div class="col-md-6">
          <div class="info-box">
            <strong>Account Type</strong>
            <p id="accountType" class="mb-0 mt-2">-</p>
          </div>
        </div>
        <div class="col-md-6">
          <div class="info-box">
            <strong>Member Since</strong>
            <p id="memberSince" class="mb-0 mt-2">-</p>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    fetch('/api/user')
      .then(res => res.json())
      .then(data => {
        document.getElementById('fullName').innerText = data.user.fullName || '-';
        document.getElementById('username').innerText = data.user.username || '-';
        document.getElementById('email').innerText = data.user.email || '-';
        document.getElementById('phone').innerText = data.user.phone || '-';
        document.getElementById('accountType').innerText = data.user.accountType || '-';
        document.getElementById('memberSince').innerText = data.user.memberSince || '-';
        document.getElementById('imgid').src = data.user.profileImage || '';
      })
      .catch(err => console.error(err));
  </script>

</body>

</html>
